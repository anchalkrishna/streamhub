<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Stream</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #0e0e10;
            color: #f1f1f1;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .desc {
            color: #a1a1aa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input, select {
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: #1f1f23;
            color: white;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: 1px solid #9147ff;
        }

        .btn {
            margin-top: 10px;
            padding: 10px;
            background: #9147ff;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .btn:hover {
            background: #7c3aed;
        }

        .note {
            margin-top: 15px;
            font-size: 12px;
            color: #71717a;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Register Your Stream</h1>

    <p class="desc">
        For GTA V and RP streamers. Register with your channel details to have your streams displayed and automatically shown when you go live.
    </p>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Channel Name" required>

        <select name="platform" required>
            <option value="">Select Platform</option>
            <option value="youtube">YouTube</option>
            <option value="kick">Kick</option>
        </select>

        <input type="text" name="channel_id" placeholder="Channel ID / Username" required>

        <select name="category" id="category" required onchange="toggleGang()">
            <option value="">Select Category</option>
            <option value="citizen">Citizen</option>
            <option value="gang">Gang</option>
            <option value="admin">Admin</option>
        </select>

        <input type="text" name="gang_name" id="gangField" placeholder="Enter Gang Name" style="display:none;">

        <button type="submit" class="btn">Submit Request</button>
    </form>

    <div class="note">
        Your request will be reviewed by admin before approval.
    </div>

</div>

<script>
function toggleGang() {
    let category = document.getElementById("category").value;
    let gangField = document.getElementById("gangField");

    if (category === "gang") {
        gangField.style.display = "block";
        gangField.required = true;
    } else {
        gangField.style.display = "none";
        gangField.required = false;
    }
}
</script>

</body>
</html>
